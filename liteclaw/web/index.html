<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteClaw - WebChat</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #333;
            font-weight: 600;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .msg {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
        }
        .msg.user {
            align-self: flex-end;
            background: #1a4d7a;
        }
        .msg.model {
            align-self: flex-start;
            background: #2a2a2a;
            white-space: pre-wrap;
        }
        .msg.tool {
            align-self: flex-start;
            background: #1a3a2a;
            font-size: 0.9em;
        }
        #input-area {
            padding: 1rem;
            border-top: 1px solid #333;
            display: flex;
            gap: 0.5rem;
        }
        #input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
        }
        #input:focus {
            outline: none;
            border-color: #1a4d7a;
        }
        #send {
            padding: 0.75rem 1.5rem;
            background: #1a4d7a;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        #send:hover { background: #2563ab; }
        #send:disabled { opacity: 0.5; cursor: not-allowed; }
        #status {
            padding: 0.25rem 1rem;
            font-size: 0.85em;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="header">LiteClaw WebChat</div>
    <div id="status">Conectando...</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="input" placeholder="Digite sua mensagem..." autocomplete="off">
        <button id="send">Enviar</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
